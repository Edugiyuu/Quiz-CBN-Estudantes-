<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Quiz - Segurança Digital</title>
    <link rel="stylesheet" href="../css/quiz.css"> 
    <script src="../java script/quiz.js"></script>
</head>
<body>

    <div class="quiz-container">

        <!-- Cabeçalho -->
        <div class="header">
            <h1>🔐 CYBER QUIZ</h1>
            <p>Segurança Digital 🚀</p>

            <div class="stats">
                <div class="stat-box">🎯 1/10</div>
                <div class="stat-box">⭐ 0</div>
            </div>

            <div class="progress-bar">
                <div class="progress"></div>
            </div>
        </div>

        <!-- Pergunta -->
        <div class="question-area">

            <div class="question-badge">
                ✨ PERGUNTA 1
            </div>

            <h2>
                O que torna uma senha mais segura?
            </h2>

            <div class="option">
                <span class="letter">A</span>
                <p>Usar apenas números</p>
            </div>

            <div class="option">
                <span class="letter">B</span>
                <p>Usar informações pessoais</p>
            </div>

            <div class="option correct">
                <span class="letter">C</span>
                <p>Misturar letras, números e símbolos</p>
            </div>

            <div class="option">
                <span class="letter">D</span>
                <p>Deixar a senha curta</p>
            </div>

        </div>

    </div>

</body>
</html>
